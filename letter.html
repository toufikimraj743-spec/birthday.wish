<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Letter ❤️</title>

    <link rel="stylesheet" href="letter.css">

    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
</head>

<body>

<div class="card">

    <!-- Left Photos -->
    <div class="left">

        <img src="images/princ1.jpg" class="photo small">

        <img src="images/princ2.jpg" class="photo big">

    </div>

    <!-- Middle -->
    <div class="middle">

        <img src="images/dogmicro12.png" class="snoopy-top">

        <img src="images/flower1.png" class="flower">

        <div class="clipboard-area">

            <div class="board">

            <img src="images/board.jpg" class="clipboard">
            </div>

            <div class="letter">

                <h3>Happy Birthday Babe! ❤️</h3>

                <p>
                    I know I always say this to you,
                    but I really do miss you.
                    Thank you for being such a wonderful
                    person in my life.
                    Thank you for always supporting me,
                    believing in me, and making me smile.
                    I love you so much. 💖
                </p>

            </div>

        </div>

        <img src="images/dogmicro24k.png" class="snoopy-bottom">

    </div>

    <!-- Right -->
    <div class="right">

        <img src="images//oip1.png" class="star">

        <button id="nextBtn" onclick="nextPage()">
            Next
        </button>

    </div>

</div>

<script src="letter.js"></script>

</body>
</html>
