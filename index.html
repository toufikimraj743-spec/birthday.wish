<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Lock</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="left">
        <img src="images/dog1.jpg" alt="Snoopy">
    </div>

    <div class="right">

        <div class="display">
            <div class="box" id="b1"></div>
            <div class="box" id="b2"></div>
            <div class="box" id="b3"></div>
            <div class="box" id="b4"></div>
        </div>

        <div class="keypad">

            <button class="heart" onclick="press('1')">1</button>
            <button class="heart" onclick="press('2')">2</button>
            <button class="heart" onclick="press('3')">3</button>

            <button class="heart" onclick="press('4')">4</button>
            <button class="heart" onclick="press('5')">5</button>
            <button class="heart" onclick="press('6')">6</button>

            <button class="heart" onclick="press('7')">7</button>
            <button class="heart" onclick="press('8')">8</button>
            <button class="heart" onclick="press('9')">9</button>

            <button class="heart" onclick="press('*')">*</button>
            <button class="heart" onclick="press('0')">0</button>
            <button class="heart" onclick="press('#')">#</button>

        </div>

        <p id="msg"></p>
        <button id="nextBtn" onclick="goNext()"
        style="display:none;">
            Continue ❤️</button>

    </div>

</div>


<script src="script.js"></script>

</body>
</html>
